<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
</head>
<body>

    <h1>Tabela em HTML</h1>

    <table> <!-- <table border="1"> faz a borda escolhe um numero para o tamanho da borda-->

        <thead>
            <tr>
                <th>Produto</th>
                <th>Preço</th>
                <th>Categoria</th>

            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Fone</td>
                <td>250,00</td>
                <td>Eletronicos</td>
            </tr>    
                
            <tr>
                <td>Mouse</td>
                <td>180,00</td>
                <td>TI</td>
            </tr> 

            <tr>
                <td>Teclado</td>
                <td>200,00</td>
                <td>TI</td>
            </tr>
        </tbody>

    </table>
    
</body>
</html>
