<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imagens</title>
  </head>
  <body>
    <h1>Imagens</h1>

    <img src="../img/camisa.jpg" height="200" alt="camisa branca" /> <br />
    <img
      src="../img/galaxia.jpeg"
      width="10%"
      loading="lazy"
      alt="garota galaxia"
    />
    <br />

    <figure>
      <img src="../img/iphone.jpg" width="10%" loading="lazy" />
      <figcaption>iPhone 17 Pro Max Laranja</figcaption>
    </figure>

    <h1>Vídeos</h1>

    <video
      controls
      loading="lazy"
      width="400"
      muted
      loop
      poster="../img/firjan.png"
    >
      <!--autoplay-->
      <source src="../video/video.mp4" type="video/mp4" />
      Seu navegador não suporta a reprodução de videos
    </video>

    <h1>iframe youtube</h1>

    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/aY3IMJfBCpw?si=O_BbXRIcjy7r0tQ4"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>

    <h1>iframe google maps</h1>
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14700.346199392541!2d-43.20862306403402!3d-22.9101783028719!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x997f0c4e687185%3A0x973c7a140b9b61fa!2sEdif%C3%ADcio%20Eco%20Sapuca%C3%AD!5e0!3m2!1spt-BR!2sbr!4v1783607168253!5m2!1spt-BR!2sbr"
      width="400"
      height="300"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
  </body>
</html>
